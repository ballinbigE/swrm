<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swrm">
  <title>Swrm</title>
  <defs>
    <clipPath id="bclip"><ellipse cx="0" cy="0" rx="12" ry="8.5"/></clipPath>
    <g id="bee">
      <ellipse cx="0" cy="0" rx="12" ry="8.5" fill="#d97757"/>
      <g clip-path="url(#bclip)">
        <rect x="-2.2" y="-10" width="3.6" height="20" fill="#3d2114"/>
        <rect x="4.8" y="-10" width="3.6" height="20" fill="#3d2114"/>
        <rect x="-9.2" y="-10" width="3" height="20" fill="#3d2114"/>
      </g>
      <ellipse cx="-3" cy="-8.5" rx="7" ry="4.2" fill="#f3ede6" opacity="0.85" transform="rotate(-30 -3 -8.5)"/>
      <ellipse cx="3.5" cy="-9" rx="6.4" ry="3.8" fill="#f3ede6" opacity="0.8" transform="rotate(22 3.5 -9)"/>
    </g>
  </defs>

  <!-- rounded container -->
  <rect x="4" y="4" width="112" height="112" rx="26" fill="#15171c"/>
  <rect x="4.5" y="4.5" width="111" height="111" rx="25.5" stroke="#2a2e38"/>

  <!-- flight trails -->
  <g stroke="#d97757" stroke-width="2" fill="none" opacity="0.35" stroke-linecap="round" stroke-dasharray="0.5 6">
    <path d="M26 99 C 44 74, 59 82, 74 59"/>
    <path d="M34 44 C 54 54, 64 42, 89 52"/>
    <path d="M59 104 C 74 92, 86 96, 99 79"/>
  </g>

  <!-- swarm: 5 bees -->
  <use href="#bee" transform="translate(76,56) scale(0.95) rotate(-12)"/>
  <use href="#bee" transform="translate(48,46) scale(0.7) rotate(8)"/>
  <use href="#bee" transform="translate(90,84) scale(0.62) rotate(-20)"/>
  <use href="#bee" transform="translate(54,86) scale(0.8) rotate(15)"/>
  <use href="#bee" transform="translate(34,70) scale(0.5) rotate(-6)"/>
</svg>
